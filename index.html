<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thu vien anh tuong tac</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body onload="addTabFocus()">
  <main class="page">
    <h1>Thu vien anh tuong tac</h1>

    <p class="intro">
      Chon mot khung anh bang chuot hoac ban phim de xem anh lon va doc mo ta ngan ve tung khung canh.
    </p>

    <div id="image" aria-live="polite">
      Dua chuot hoac tab den mot hinh anh ben duoi de hien thi o day.
    </div>

    <section class="gallery" aria-label="Danh sach anh xem truoc">
      <figure>
        <img
          class="preview"
          src="images/mountain.svg"
          alt="Nui xanh trong anh binh minh"
          onmouseover="upDate(this)"
          onmouseleave="unDo()"
          onfocus="upDate(this)"
          onblur="unDo()"
        >
        <figcaption>Nui xanh vao buoi sang</figcaption>
      </figure>

      <figure>
        <img
          class="preview"
          src="images/forest.svg"
          alt="Con duong nho di qua khu rung xanh"
          onmouseover="upDate(this)"
          onmouseleave="unDo()"
          onfocus="upDate(this)"
          onblur="unDo()"
        >
        <figcaption>Loi mon giua rung</figcaption>
      </figure>

      <figure>
        <img
          class="preview"
          src="images/ocean.svg"
          alt="Mat bien xanh yen binh duoi bau troi sang"
          onmouseover="upDate(this)"
          onmouseleave="unDo()"
          onfocus="upDate(this)"
          onblur="unDo()"
        >
        <figcaption>Bien xanh yen binh</figcaption>
      </figure>

      <figure>
        <img
          class="preview"
          src="images/city.svg"
          alt="Thanh pho sang den vao buoi toi"
          onmouseover="upDate(this)"
          onmouseleave="unDo()"
          onfocus="upDate(this)"
          onblur="unDo()"
        >
        <figcaption>Thanh pho ve dem</figcaption>
      </figure>

      <figure>
        <img
          class="preview"
          src="images/desert.svg"
          alt="Sa mac vang voi mat troi dang lan"
          onmouseover="upDate(this)"
          onmouseleave="unDo()"
          onfocus="upDate(this)"
          onblur="unDo()"
        >
        <figcaption>Sa mac luc hoang hon</figcaption>
      </figure>

      <figure>
        <img
          class="preview"
          src="images/garden.svg"
          alt="Khu vuon hoa nhieu mau sac"
          onmouseover="upDate(this)"
          onmouseleave="unDo()"
          onfocus="upDate(this)"
          onblur="unDo()"
        >
        <figcaption>Khu vuon day mau sac</figcaption>
      </figure>
    </section>
  </main>

  <script src="js/javascript.js"></script>
</body>
</html>
